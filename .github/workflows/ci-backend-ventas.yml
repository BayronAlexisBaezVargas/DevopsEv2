name: CI/CD Backend Ventas

on:
  push:
    branches: [ "main" ]
    paths:
      - "back-Ventas_SpringBoot/**"
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build y Push Ventas a ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.registry }}
        REPO_NAME: ${{ secrets.ECR_REPO_NAME_VENTAS }}
      run: |
        cd back-Ventas_SpringBoot/Springboot-API-REST
        docker build -t $ECR_REGISTRY/$REPO_NAME:latest .
        docker push $ECR_REGISTRY/$REPO_NAME:latest

    - name: Desplegar Ventas vía SSM (Docker Compose)
      run: |
        aws ssm send-command \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters '{"commands":[
            "aws ecr get-login-password --region '${{ secrets.AWS_REGION }}' | docker login --username AWS --password-stdin ${{ steps.login-ecr.registry }}",
            "cd /home/ec2-user/app",
            "docker-compose pull app-backend-ventas",
            "docker-compose up -d --force-recreate --no-deps app-backend-ventas"
          ]}' \
          --output text