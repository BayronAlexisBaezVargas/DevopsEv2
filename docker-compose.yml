version: '3.8'

services:
  # 1. Creamos la base de datos que el código está pidiendo
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=proyecto_db
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=adminpassword
    ports:
      - "3306:3306"

  # 2. Backend de Ventas
  app-backend-ventas:
    image: ${ECR_REPO_URL_VENTAS}:latest
    container_name: app-backend-ventas
    ports:
      - "8081:8080"
    restart: always
    depends_on:
      - mysql-db
    environment:
      - DB_ENDPOINT=mysql-db  # Se conecta automáticamente al contenedor de arriba
      - DB_PORT=3306
      - DB_NAME=proyecto_db
      - DB_USERNAME=admin
      - DB_PASSWORD=adminpassword

  # 3. Backend de Despachos
  app-backend-despachos:
    image: ${ECR_REPO_URL_DESPACHOS}:latest
    container_name: app-backend-despachos
    ports:
      - "8082:8080"
    restart: always
    depends_on:
      - mysql-db
    environment:
      - DB_ENDPOINT=mysql-db  # Se conecta automáticamente al contenedor de arriba
      - DB_PORT=3306
      - DB_NAME=proyecto_db
      - DB_USERNAME=admin
      - DB_PASSWORD=adminpassword