version: '3.8'

services:
  app-backend-ventas:
    image: ${ECR_REPO_URL_VENTAS}:latest
    container_name: app-backend-ventas
    ports:
      - "8081:8080"
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/nombre_tu_bd
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}

  app-backend-despachos:
    image: ${ECR_REPO_URL_DESPACHOS}:latest
    container_name: app-backend-despachos
    ports:
      - "8082:8080"
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://${DB_HOST}:3306/nombre_tu_bd
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}