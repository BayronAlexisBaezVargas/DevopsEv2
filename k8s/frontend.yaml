apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        # Update with your actual ECR image URL when deploying
        image: 174448597449.dkr.ecr.us-east-1.amazonaws.com/front:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer # Exposes the frontend to the internet via AWS ELB
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
